name: Auto Tweet Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Créer session et envoyer message
        run: |
          SESSION=$(curl -s -X POST https://api.anthropic.com/v1/sessions \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: sessions-2025-05-14" \
            -H "Content-Type: application/json" \
            -d '{"agent_id": "agent_01RHCXW3qz6xwmENMpNLx7ZS"}')
          echo "Session: $SESSION"
          SESSION_ID=$(echo $SESSION | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          curl -s -X POST "https://api.anthropic.com/v1/sessions/$SESSION_ID/events" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: sessions-2025-05-14" \
            -H "Content-Type: application/json" \
            -d '{"type":"user.message","content":[{"type":"text","text":"Run a full cycle"}]}'
